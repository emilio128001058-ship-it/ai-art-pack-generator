name: Test Suite

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=scripts --cov=utils --cov-report=term-missing

      - name: Dry-run pipeline smoke test
        run: python scripts/run_automation.py --dry-run --skip-webhooks --json
