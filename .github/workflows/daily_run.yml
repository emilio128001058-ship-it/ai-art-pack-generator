name: Daily Art Pack Generation

on:
  schedule:
    # Every day at 7:00 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: 'Specific theme (leave empty for random)'
        required: false
        default: ''
      style:
        description: 'Specific style (leave empty for random)'
        required: false
        default: ''
      count:
        description: 'Number of images (leave empty for random 40-80)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no API calls)'
        type: boolean
        required: false
        default: false

jobs:
  generate-art-pack:
    name: Generate & Distribute Art Pack
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run art pack pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZAPIER_MAIN_WEBHOOK_URL: ${{ secrets.ZAPIER_MAIN_WEBHOOK_URL }}
          ZAPIER_ETSY_WEBHOOK_URL: ${{ secrets.ZAPIER_ETSY_WEBHOOK_URL }}
          ZAPIER_GDRIVE_WEBHOOK_URL: ${{ secrets.ZAPIER_GDRIVE_WEBHOOK_URL }}
          ZAPIER_NOTION_WEBHOOK_URL: ${{ secrets.ZAPIER_NOTION_WEBHOOK_URL }}
          ZAPIER_EMAIL_WEBHOOK_URL: ${{ secrets.ZAPIER_EMAIL_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.theme }}" ]; then
            ARGS="$ARGS --theme ${{ github.event.inputs.theme }}"
          fi
          if [ -n "${{ github.event.inputs.style }}" ]; then
            ARGS="$ARGS --style \"${{ github.event.inputs.style }}\""
          fi
          if [ -n "${{ github.event.inputs.count }}" ]; then
            ARGS="$ARGS --count ${{ github.event.inputs.count }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/run_automation.py --json $ARGS

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      - name: Upload generated ZIPs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: art-packs-${{ github.run_id }}
          path: output/zips/
          retention-days: 7
